name: CI Security Gate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint -- --max-warnings=0

      - name: Type check
        run: npm run type-check

      - name: Unit tests
        run: npm test -- --ci --runInBand

      - name: Production build
        run: npm run build
        env:
          NEXTAUTH_URL: http://localhost:3000
          NEXTAUTH_SECRET: ci-build-only-secret
          NEXT_PUBLIC_PAGERDUTY_CLIENT_ID: ci-build-only-client-id

  dependency-audit:
    name: Production Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --omit=dev --ignore-scripts

      - name: Audit production dependencies
        run: npm audit --omit=dev --json > npm-audit-ci.json || true

      - name: Enforce production high threshold
        run: |
          node -e "
            const r = JSON.parse(require('fs').readFileSync('npm-audit-ci.json', 'utf8'));
            const v = r.metadata?.vulnerabilities ?? {};
            if ((v.high ?? 0) > 0 || (v.critical ?? 0) > 0) {
              console.error('High/critical vulnerabilities found in production tree:', v);
              process.exit(1);
            }
            console.log('No high/critical vulnerabilities in production dependency tree.');
          "

      - name: Upload audit artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: npm-audit-ci
          path: npm-audit-ci.json
          retention-days: 7

  dependency-review:
    name: Dependency Review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Dependency review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          comment-summary-in-pr: always
